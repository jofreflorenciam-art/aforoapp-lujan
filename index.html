<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Raleway', sans-serif;
            background-color: #fff8f7;
        }
        /* No shadows or rounded corners as per style guidance */
        input, select, button {
            border-radius: 0 !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-background">
<!-- Login Container -->
<main class="w-full max-w-[400px] flex flex-col overflow-hidden">
<!-- Top Area: White Header -->
<header class="bg-[#FFFFFF] p-margin-mobile md:p-margin-desktop flex flex-col items-center text-center border-x border-t border-secondary-fixed">
<div class="mb-0"><img alt="Expreso Luján de Cuyo S.A." class="h-20 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_XmCJQI2Y5hmCTSi84BAu1DoNwJzFx0ZcXctjkDB9m5aIJQwG6PS-yj3qRUH86rH5s1fFQWfbt55VgWy_AvM218udNfyO5RIFkTkHy2dIVc0qiF3yozAD-g_9n9P9uq7LTHYwDMKh-MjHsLxz12POY_dytyH7fBIF_yFqCgraSrBZPwYaDggtqp7NjSwY3ub3VPjV0iBrrYmF_L5KtzjRnxCN1ecyB6SqaHOWydT-iPX78dqsoOQHn0kSjtsXFyq9QmMQl_S8bRo"></div>
</header>
<!-- Form Area -->
<section class="bg-white p-margin-mobile md:p-margin-desktop border-x border-b border-secondary-fixed">
<form class="flex flex-col gap-stack-lg" onsubmit="event.preventDefault();">
<!-- Username -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="username">USUARIO</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary">person</span>
<input class="w-full h-[48px] pl-12 pr-4 border border-secondary-fixed bg-surface-bright focus:border-primary-container focus:ring-0 text-on-surface font-body-md text-body-md" id="username" name="username" placeholder="Ej: j.perez" type="text">
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="password">CONTRASEÑA</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary">lock</span>
<input class="w-full h-[48px] pl-12 pr-4 border border-secondary-fixed bg-surface-bright focus:border-primary-container focus:ring-0 text-on-surface font-body-md text-body-md" id="password" name="password" placeholder="••••••••" type="password">
</div>
</div>
<!-- Branch Selector -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="branch">SUCURSAL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary">location_on</span>
<select class="w-full h-[48px] pl-12 pr-4 border border-secondary-fixed bg-surface-bright focus:border-primary-container focus:ring-0 text-on-surface font-body-md text-body-md appearance-none" id="branch" name="branch">
<option value="">Seleccione sucursal</option>
<option value="mendoza">Mendoza (Casa Central)</option>
<option value="bsas">Buenos Aires</option>
<option value="cordoba">Córdoba</option>
<option value="rosario">Rosario</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-secondary pointer-events-none">expand_more</span>
</div>
</div>
<!-- Submit Button -->
<button class="mt-stack-lg w-full h-[48px] bg-primary-container text-white font-label-bold text-label-bold tracking-widest active:scale-[0.98] transition-transform duration-150 flex items-center justify-center gap-2" type="submit">
                    INGRESAR
                    <span class="material-symbols-outlined">login</span>
</button>
<!-- Footer Links -->
<div class="mt-4 flex justify-between items-center">
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">¿Olvidó su contraseña?</a>
<span class="font-label-sm text-label-sm text-outline-variant">v1.2.0</span>
</div>
</form>
</section>
<!-- Aesthetic Branding Element -->
<footer class="mt-8 text-center opacity-20 grayscale pointer-events-none select-none">
<!-- Placeholder for a technical grid pattern or small logo -->
<div class="grid grid-cols-4 gap-2 px-12">
<div class="h-1 bg-secondary"></div>
<div class="h-1 bg-secondary"></div>
<div class="h-1 bg-primary"></div>
<div class="h-1 bg-secondary"></div>
</div>
</footer>
</main>
<!-- Background Illustration/Image (Subtle) -->
<div class="fixed inset-0 -z-10 overflow-hidden opacity-5 pointer-events-none">
<img class="w-full h-full object-cover" data-alt="A high-angle architectural shot of a massive, modern logistics warehouse distribution center. The scene is dominated by clean lines, concrete floors, and steel structures, bathed in a cool, bright morning light. The color palette is industrial, featuring shades of light grey and white with occasional red safety markings. The mood is professional, efficient, and highly organized, reflecting a global transport infrastructure." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAg1dWzaYT1n1mF1vXcGj1LeXrRKhnCgUaon3LYAIMWCGT50DtgQLEbTqIEDG2gUe2ydaMNts-gUNXbn1MR5zNN55BH2Pr9bsNHoMxz8xrK7wb4makFrmFsLxiDRut5q47hoXWvwnJoQER7Nb4sw4RapP09J0SwCWufiz8Ee7Ej3n-o_8IetOyQff2UOj_mTGGxOFdII6uCqmrCLPWK8D_0VooqZFyK5leWpzGpht_xuqECFyJQvo0g28i_3BrPfH0rrs-Sy_uiuPM">
</div>
<!-- Micro-interaction Script -->
<script>
        document.querySelector('form').addEventListener('submit', function() {
            const btn = this.querySelector('button');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> ACCEDIENDO...';
            btn.classList.add('opacity-80');
            
            // Artificial delay to simulate industrial system response
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> BIENVENIDO';
                btn.classList.remove('bg-primary-container');
                btn.classList.add('bg-green-700');
            }, 1200);
        });
    </script>
</body></html>
